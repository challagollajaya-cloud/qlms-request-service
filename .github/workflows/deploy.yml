name: Deploy Request Service

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: qlmsregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        run: |
          docker build -t qlmsregistry.azurecr.io/qlms-request:latest .
          docker push qlmsregistry.azurecr.io/qlms-request:latest

      - name: Deploy to AKS
        run: |
          az login --service-principal -u 1f71efe2-7ad9-4f22-869f-85106e937c8a -p iQv8Q~YF4dRw-XGpiOfOG_ysPeZjFzLk1jm8Rdfy --tenant 4941e163-891f-4752-af66-5dc5338b9f91
          az aks get-credentials --resource-group flowershop-rg --name qlms-aks --overwrite-existing
          kubectl rollout restart deployment qlms-request -n qlms